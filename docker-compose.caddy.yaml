services:
  caddy:
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_HOST_PORT:-80}:80"
      - "${CADDY_HTTPS_HOST_PORT:-443}:443"
    volumes:
      - type: bind
        source: ${AGENTFORGE_CADDYFILE_PATH}
        target: /etc/caddy/Caddyfile
        read_only: true
      - type: volume
        source: caddy-data
        target: /data
      - type: volume
        source: caddy-config
        target: /config
    depends_on:
      compose-dashboard:
        condition: service_started
      openwa-dashboard:
        condition: service_started
      webhook:
        condition: service_started
    networks:
      - aspire

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
